<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Quds - نظام الكشافة المطور</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1b5e20; color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px 0; }
        .container { background-color: rgba(0, 0, 0, 0.85); padding: 25px; border-radius: 15px; text-align: center; width: 98%; max-width: 1150px; backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,0.1); }
        .screen { display: none; }
        .active { display: block; }
        button { display: block; width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; background-color: #ffffff; color: #1b5e20; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #e0e0e0; transform: scale(1.01); }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; color: black; font-size: 1rem; }
        .dev-link { background: none; color: #81c784; text-decoration: underline; font-size: 0.85rem; margin-top: 20px; cursor: pointer; border: none; }
        
        /* تصميم جدول الإدارة */
        .admin-table-wrapper { max-height: 550px; overflow: auto; margin-top: 15px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        table { width: 100%; min-width: 1000px; color: #222; border-collapse: collapse; font-size: 0.9rem; }
        th, td { border: 1px solid #ddd; padding: 12px 8px; text-align: center; word-break: break-word; }
        th { background: #f2f2f2; position: sticky; top: 0; z-index: 10; color: #1b5e20; font-weight: bold; border-bottom: 2px solid #1b5e20; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f1f1; }
        
        .delete-btn { background-color: #ff5252 !important; color: white !important; width: auto !important; display: inline-block; padding: 6px 15px; margin: 0; font-size: 0.8rem; border-radius: 5px; }
        .delete-btn:hover { background-color: #b71c1c !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen1" class="screen active">
        <h1>Al Quds Scout</h1>
        <p style="color: #ffd700;">نظام التسجيل المركزي - لوحة التحكم</p>
        <button onclick="openRegister('براعم')">براعم</button>
        <button onclick="openRegister('أشبال')">أشبال</button>
        <button onclick="openRegister('زهرات')">زهرات</button>
        <button onclick="openRegister('كشافة')">كشافة</button>
        <button onclick="openRegister('مرشدات')">مرشدات</button>
        <button onclick="openRegister('جوالة')">جوالة</button>
        <button class="dev-link" onclick="showView('screenLogin')">دخول الإدارة</button>
    </div>

    <div id="screenLogin" class="screen">
        <h3>تسجيل دخول الإدارة</h3>
        <input type="text" id="userIn" placeholder="اسم المستخدم">
        <input type="password" id="passIn" placeholder="كلمة المرور">
        <button onclick="checkDev()">دخول</button>
        <button onclick="showView('screen1')" style="background:#555; color:white">رجوع</button>
    </div>

    <div id="screenAdmin" class="screen">
        <h3 style="color:#ffd700">إدارة المشتركين السحابية</h3>
        <div class="admin-table-wrapper" id="adminTable">جاري تحميل البيانات...</div>
        <button onclick="showView('screen1')" style="background:#333; color:white; margin-top:15px">خروج</button>
    </div>

    <div id="screenReg" class="screen">
        <h3 id="regTitle" style="color:#ffd700">تسجيل جديد</h3>
        <input type="text" id="regName" placeholder="الاسم ثلاثي">
        <input type="tel" id="regNationalId" placeholder="الرقم القومي (14 رقم)">
        <input type="tel" id="regPhone" placeholder="رقم الهاتف (يوجد به واتساب)">
        <input type="tel" id="regParentPhone" placeholder="رقم هاتف ولي الأمر">
        <input type="text" id="regAddress" placeholder="العنوان بالتفصيل">
        <input type="text" id="regSchool" placeholder="السنة الدراسية">
        <input type="hidden" id="selectedStage">
        <button id="saveBtn" onclick="finishReg()">إرسال البيانات للسحابة</button>
        <button onclick="showView('screen1')" style="background:#555; color:white">إلغاء</button>
    </div>

    <div id="screenSuccess" class="screen">
        <h2 style="color:#81c784">تم الحفظ بنجاح!</h2>
        <button onclick="location.reload()">تسجيل فرد آخر</button>
    </div>
</div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBKfHcBDQCdhnaWfVwi5f3YqzZu6fLOmUY",
        authDomain: "al-qyds-scout.firebaseapp.com",
        projectId: "al-qyds-scout",
        storageBucket: "al-qyds-scout.firebasestorage.app",
        messagingSenderId: "1043767699741",
        appId: "1:1043767699741:web:54611db0f785bddac299f4",
        measurementId: "G-MH5ZE8LLZM",
        databaseURL: "https://al-qyds-scout-default-rtdb.firebaseio.com/" 
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function showView(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function openRegister(stage) {
        document.getElementById('selectedStage').value = stage;
        document.getElementById('regTitle').innerText = "تسجيل: " + stage;
        showView('screenReg');
    }

    // وظيفة الإرسال - تجميع كل المدخلات
    function finishReg() {
        const payload = {
            name: document.getElementById('regName').value.trim(),
            nationalId: document.getElementById('regNationalId').value.trim(),
            phone: document.getElementById('regPhone').value.trim(),
            parentPhone: document.getElementById('regParentPhone').value.trim(),
            address: document.getElementById('regAddress').value.trim(),
            schoolYear: document.getElementById('regSchool').value.trim(),
            stage: document.getElementById('selectedStage').value,
            timestamp: new Date().toLocaleString('ar-EG')
        };

        if(!payload.name || !payload.phone) { 
            alert("يرجى إدخال الاسم ورقم الهاتف على الأقل"); 
            return; 
        }

        document.getElementById('saveBtn').innerText = "جاري الحفظ الآن...";
        document.getElementById('saveBtn').disabled = true;

        database.ref('scouts').push(payload).then(() => {
            showView('screenSuccess');
        }).catch(err => {
            alert("حدث خطأ في الاتصال: " + err.message);
            document.getElementById('saveBtn').innerText = "إرسال البيانات للسحابة";
            document.getElementById('saveBtn').disabled = false;
        });
    }

    function checkDev() {
        const u = document.getElementById('userIn').value;
        const p = document.getElementById('passIn').value;
        if(u === "Ahmedmada_90" && p === "o90po90p") {
            loadCloudData();
            showView('screenAdmin');
        } else {
            alert("بيانات الدخول خاطئة");
        }
    }

    // وظيفة العرض - تضمن ظهور أي شيء مكتوب ومنع الـ undefined
    function loadCloudData() {
        database.ref('scouts').on('value', (snapshot) => {
            const data = snapshot.val();
            const tableContainer = document.getElementById('adminTable');
            
            if(!data) {
                tableContainer.innerHTML = "<p style='color:black; padding:20px; font-weight:bold;'>لا توجد بيانات مسجلة في السحابة حالياً.</p>";
                return;
            }

            let html = `<table>
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>الرقم القومي</th>
                        <th>المرحلة</th>
                        <th>الهاتف</th>
                        <th>ولي الأمر</th>
                        <th>العنوان</th>
                        <th>الدراسة</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody>`;

            for(let key in data) {
                const scout = data[key];
                
                // التأكد من جلب القيم أو وضع شرطة إذا كانت فارغة
                const name = scout.name || scout.regName || "-";
                const nId  = scout.nationalId || scout.regNationalId || "-";
                const stg  = scout.stage || "-";
                const ph   = scout.phone || scout.regPhone || "-";
                const pPh  = scout.parentPhone || scout.regParentPhone || "-";
                const addr = scout.address || scout.regAddress || "-";
                const sch  = scout.schoolYear || scout.regSchool || "-";

                html += `<tr>
                    <td style="font-weight:bold;">${name}</td>
                    <td>${nId}</td>
                    <td><span style="color:#1b5e20; font-weight:bold;">${stg}</span></td>
                    <td>${ph}</td>
                    <td>${pPh}</td>
                    <td>${addr}</td>
                    <td>${sch}</td>
                    <td>
                        <button class="delete-btn" onclick="deleteEntry('${key}', '${name.replace(/'/g, "\\'")}')">حذف</button>
                    </td>
                </tr>`;
            }
            html += "</tbody></table>";
            tableContainer.innerHTML = html;
        });
    }

    // وظيفة الحذف
    function deleteEntry(id, name) {
        if(confirm(`هل أنت متأكد من حذف بيانات المشترك: ${name}؟`)) {
            database.ref('scouts/' + id).remove()
            .then(() => {
                // سيتم تحديث الجدول تلقائياً بسبب .on('value')
            })
            .catch(err => alert("عذراً، فشل الحذف: " + err.message));
        }
    }
</script>

</body>
</html>
